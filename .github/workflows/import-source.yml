name: Import GitHub safe source package

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-source:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, 'Import GitHub safe source package') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and extract public source package
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib
          import os
          import shutil
          import ssl
          import sys
          import urllib.request
          import zipfile
          from pathlib import Path

          url = 'https://astro.r2049.cn/zhijing-github-safe-20260512.zip'
          expected = 'B094A418D3075BB9D97EBD8AEBC9E984F299D2A926A8F3F335E5E0BC7A1E4209'.lower()
          headers = {'User-Agent': 'Mozilla/5.0 GitHubActions'}
          last_error = None

          for verify in (True, False):
              try:
                  context = ssl.create_default_context() if verify else ssl._create_unverified_context()
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req, timeout=90, context=context) as response:
                      data = response.read()
                  digest = hashlib.sha256(data).hexdigest()
                  print('downloaded bytes:', len(data))
                  print('sha256:', digest)
                  if digest != expected:
                      raise RuntimeError(f'sha256 mismatch: expected {expected}, got {digest}')
                  with open('source.zip', 'wb') as f:
                      f.write(data)
                  break
              except Exception as exc:
                  last_error = exc
                  print(f'download attempt verify={verify} failed: {exc}')
          else:
              raise SystemExit(last_error)

          root = Path('source').resolve()
          if root.exists():
              shutil.rmtree(root)
          root.mkdir(parents=True)

          with zipfile.ZipFile('source.zip') as archive:
              for info in archive.infolist():
                  normalized = info.filename.replace('\\', '/').strip('/')
                  if not normalized:
                      continue
                  target = (root / normalized).resolve()
                  if not str(target).startswith(str(root) + os.sep):
                      raise RuntimeError(f'unsafe zip path: {info.filename}')
                  if info.is_dir() or normalized.endswith('/'):
                      target.mkdir(parents=True, exist_ok=True)
                      continue
                  target.parent.mkdir(parents=True, exist_ok=True)
                  with archive.open(info) as src, open(target, 'wb') as dst:
                      shutil.copyfileobj(src, dst)

          print('extracted files:', sum(1 for p in root.rglob('*') if p.is_file()))
          PY

      - name: Import source files
        run: |
          set -euo pipefail
          rsync -a --delete --exclude='.git' --exclude='.github' source/ ./
          rm -rf source source.zip

      - name: Guard against leaked secrets
        run: |
          set -euo pipefail
          if find . \
            -name 'KIMIkey.docx' -o \
            -name '知乎API.txt' -o \
            -name 'competition_key.local.json' -o \
            -name 'zhihu_openapi.local.json' -o \
            -name 'astro.release.zip' -o \
            -name '*最终参赛版*.zip' | grep .; then
            echo 'Sensitive local file was imported.'
            exit 1
          fi
          if grep -R -I -E 'Bearer [A-Za-z0-9._-]{24,}|[a-f0-9]{32}\.[A-Za-z0-9_-]{12,}' . \
            --exclude-dir=.git \
            --exclude-dir=.github \
            --exclude='providers.js' \
            --exclude='README.md'; then
            echo 'Possible secret pattern found.'
            exit 1
          fi

      - name: Commit imported source
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit."
            exit 0
          fi
          git commit -m "Import GitHub safe source package"
          git push
