<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>知乎创作图鉴 - 作品资产库与写作指纹系统</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0b08;
      --bg-panel: #141210;
      --bg-card: #1a1815;
      --bg-hover: #201e1a;
      --bg-active: #272420;
      --gold: #c8a44a;
      --gold-light: #e6c46a;
      --gold-dim: #8a6c2e;
      --gold-glow: rgba(200,164,74,0.12);
      --gold-glow2: rgba(200,164,74,0.06);
      --border: rgba(200,164,74,0.1);
      --border-mid: rgba(200,164,74,0.22);
      --border-bright: rgba(200,164,74,0.35);
      --text-1: #e4dbc8;
      --text-2: #948878;
      --text-3: #524c42;
      --link-strong: rgba(200,164,74,0.7);
      --link-mid: rgba(140,110,60,0.5);
      --link-weak: rgba(60,54,44,0.6);
      --node-active-inner: #302410;
      --node-active-outer: #1c1608;
      --node-locked-inner: #181614;
      --node-locked-outer: #111009;
      --green: #5aaa72;
      --green-bg: rgba(90,170,114,0.08);
      --blue: #5a8aaa;
      --blue-bg: rgba(90,138,170,0.12);
      --danger: #bb6b5d;
      --danger-bg: rgba(187,107,93,0.08);
    }
    html.theme-light {
      --bg: #f5f8ff;
      --bg-panel: #ffffff;
      --bg-card: #f8fbff;
      --bg-hover: #edf5ff;
      --bg-active: #e7f1ff;
      --gold: #1772f6;
      --gold-light: #3f8cff;
      --gold-dim: #77aaf2;
      --gold-glow: rgba(23,114,246,0.10);
      --gold-glow2: rgba(23,114,246,0.05);
      --border: rgba(23,114,246,0.12);
      --border-mid: rgba(23,114,246,0.22);
      --border-bright: rgba(23,114,246,0.38);
      --text-1: #121b2b;
      --text-2: #4f627a;
      --text-3: #8ca0b8;
      --link-strong: rgba(23,114,246,0.56);
      --link-mid: rgba(67,136,220,0.38);
      --link-weak: rgba(130,160,195,0.34);
      --node-active-inner: #ffffff;
      --node-active-outer: #dcecff;
      --node-locked-inner: #f2f6fb;
      --node-locked-outer: #e3ebf5;
      --green: #248b62;
      --green-bg: rgba(36,139,98,0.08);
      --blue: #1d6fd1;
      --blue-bg: rgba(29,111,209,0.10);
      --danger: #b74f42;
      --danger-bg: rgba(183,79,66,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans SC', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      padding: 20px 16px 60px;
      font-size: 14px;
    }
    html.theme-light body {
      background:
        radial-gradient(circle at 16% 0%, rgba(23,114,246,0.08), transparent 30%),
        linear-gradient(180deg, #fbfdff 0%, var(--bg) 62%, #eef5ff 100%);
    }

    /* header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .header h1 { font-family: 'Noto Serif SC', serif; font-size: 17px; font-weight: 700; color: var(--gold); letter-spacing: 0.12em; }
    .header-sub { font-size: 11px; color: var(--text-3); }
    .settings-btn,
    .onboarding-replay-btn,
    .theme-toggle-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-3); font-size: 17px; padding: 4px 6px;
      border-radius: 6px; line-height: 1; font-family: inherit;
      transition: color 0.15s, background 0.15s;
    }
    .settings-btn:hover,
    .onboarding-replay-btn:hover,
    .theme-toggle-btn:hover { color: var(--gold); background: var(--gold-glow); }
    .onboarding-replay-btn,
    .theme-toggle-btn {
      width: 28px; height: 28px; display: grid; place-items: center;
      flex-shrink: 0; font-size: 15px;
    }
    .onboarding-replay-btn { font-weight: 700; font-size: 14px; }
    .onboarding-entry-hint {
      position: fixed; right: 58px; top: 48px; z-index: 12000;
      width: min(236px, calc(100vw - 32px));
      padding: 12px 12px 10px;
      border: 1px solid var(--border-bright); border-radius: 10px;
      background: var(--bg-panel); color: var(--text-2);
      box-shadow: 0 16px 44px rgba(0,0,0,.42), 0 0 0 1px var(--gold-glow);
      opacity: 0; transform: translateY(-6px); pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
    }
    .onboarding-entry-hint[hidden] { display: none; }
    .onboarding-entry-hint.visible {
      opacity: 1; transform: translateY(0); pointer-events: auto;
    }
    .onboarding-entry-hint::before {
      content: ''; position: absolute; top: -7px; right: 78px;
      width: 12px; height: 12px; transform: rotate(45deg);
      background: var(--bg-panel); border-left: 1px solid var(--border-bright);
      border-top: 1px solid var(--border-bright);
    }
    .onboarding-entry-title {
      color: var(--gold-light); font-weight: 700; font-size: 12px;
      margin-bottom: 4px;
    }
    .onboarding-entry-body {
      font-size: 12px; line-height: 1.6; color: var(--text-2);
    }
    .onboarding-entry-actions {
      display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px;
    }
    .onboarding-entry-actions button {
      border: 1px solid var(--border-mid); border-radius: 7px;
      background: var(--bg-card); color: var(--gold); padding: 6px 9px;
      font-size: 12px; cursor: pointer; font-family: inherit;
    }
    .onboarding-entry-actions button.primary {
      background: var(--gold); border-color: var(--gold); color: var(--bg);
      font-weight: 600;
    }
    html.theme-light .onboarding-entry-hint {
      box-shadow: 0 16px 44px rgba(28,54,94,.18), 0 0 0 1px rgba(23,114,246,.08);
    }
    html.theme-light .theme-toggle-btn {
      color: var(--gold); background: rgba(23,114,246,0.08);
    }

    .top-metrics {
      display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px;
      background: var(--bg-panel); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 9px; overflow: hidden;
    }
    .metric { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
    .metric-label { font-size: 10px; color: var(--text-3); letter-spacing: 0.5px; white-space: nowrap; }
    .metric-val {
      font-size: 11px; color: var(--text-1); font-weight: 500;
      font-family: 'Noto Serif SC', serif; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .metric-val b { color: var(--gold); font-weight: 600; }
    .prog-wrap {
      display: flex; align-items: center; gap: 7px; min-width: 0;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 4px 9px;
    }
    .prog-label { font-size: 10px; color: var(--text-2); white-space: nowrap; }
    .prog-track {
      flex: 0 0 54px; width: 54px; max-width: 54px;
      height: 3px; background: var(--bg-active); border-radius: 2px; overflow: hidden;
    }
    .prog-fill { height: 100%; width: 0%; background: linear-gradient(90deg,var(--gold-dim),var(--gold)); border-radius: 2px; transition: width 0.25s ease; }
    .prog-pct { font-size: 11px; color: var(--gold); font-weight: 600; min-width: 30px; text-align: right; }
    .prog-goal {
      flex-shrink: 0; width: 54px; height: 22px;
      background: var(--bg-panel); border: 1px solid var(--border-mid);
      border-radius: 12px; color: var(--gold); font-size: 10px;
      padding: 0 4px; outline: none; font-family: inherit; cursor: pointer;
    }
    .prog-goal:focus { border-color: var(--gold); color: var(--gold-light); }
    .top-period-hint {
      color: var(--text-3); font-size: 10px; line-height: 1.3;
      padding: 0 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .prog-wrap.achieved { border-color: var(--gold-dim); background: var(--gold-glow); }
    .prog-wrap.achieved .prog-label,
    .prog-wrap.achieved .prog-pct { color: var(--gold-light); }
    .prog-wrap.achieved .prog-fill {
      background: linear-gradient(90deg,var(--gold),var(--gold-light));
      box-shadow: 0 0 10px rgba(200,164,74,.45);
    }

    /* project bar */
    .project-bar { display: flex; align-items: center; gap: 3px; flex: 1; min-width: 0; max-width: 198px; margin: 0 8px; }
    .project-select {
      flex: 1; min-width: 0; background: var(--bg-card); border: 1px solid var(--border-mid);
      border-radius: 6px; color: var(--text-2); font-size: 11px;
      padding: 4px 6px; outline: none; font-family: inherit; cursor: pointer;
    }
    .project-select:focus { border-color: var(--gold); color: var(--gold-light); }
    .project-capture-btn {
      position: relative; width: 24px; height: 24px; flex-shrink: 0;
      display: grid; place-items: center; background: var(--bg-card);
      border: 1px solid var(--border-mid); border-radius: 6px;
      cursor: pointer; transition: border-color 0.15s, background 0.15s, transform 0.15s;
    }
    .project-capture-btn:hover:not(:disabled) {
      background: var(--gold-glow); border-color: var(--gold);
      transform: translateY(-1px);
    }
    .project-capture-btn:disabled { opacity: 0.55; cursor: wait; transform: none; }
    .capture-graph-icon {
      position: relative; width: 15px; height: 14px; display: block;
    }
    .capture-graph-icon::before,
    .capture-graph-icon::after {
      content: ""; position: absolute; height: 1px; left: 3px;
      background: var(--gold-dim); transform-origin: left center;
    }
    .capture-graph-icon::before { top: 8px; width: 10px; transform: rotate(-28deg); }
    .capture-graph-icon::after { top: 8px; width: 9px; transform: rotate(28deg); }
    .capture-graph-icon i {
      position: absolute; width: 4px; height: 4px; border-radius: 50%;
      background: var(--gold); box-shadow: 0 0 7px rgba(200,164,74,0.72);
    }
    .capture-graph-icon i:nth-child(1) { left: 0; top: 8px; }
    .capture-graph-icon i:nth-child(2) { left: 5px; top: 2px; }
    .capture-graph-icon i:nth-child(3) { right: 0; bottom: 1px; }
    .project-capture-btn.is-loading .capture-graph-icon {
      animation: capturePulse 0.75s ease-in-out infinite alternate;
    }
    @keyframes capturePulse {
      from { opacity: 0.55; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1.05); }
    }
    .proj-del-btn {
      background: none; border: none; color: var(--text-3); font-size: 12px;
      cursor: pointer; padding: 3px 5px; border-radius: 4px;
      line-height: 1; font-family: inherit; flex-shrink: 0;
      transition: color 0.15s, background 0.15s;
    }
    .proj-del-btn:hover:not(:disabled) { color: var(--danger); background: var(--danger-bg); }
    .proj-del-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    body[data-active-tab="map"] {
      padding: 10px 10px 34px;
    }
    body[data-active-tab="map"] .header {
      margin-bottom: 8px;
      gap: 8px;
    }
    body[data-active-tab="map"] .header h1,
    body[data-active-tab="map"] .top-metrics {
      display: none;
    }
    body[data-active-tab="map"] .project-bar {
      margin: 0;
      max-width: none;
    }
    body[data-active-tab="map"] .project-select {
      height: 30px;
    }
    body[data-active-tab="map"] .settings-btn {
      flex-shrink: 0;
    }
    body[data-active-tab="map"] .tab-nav {
      margin-bottom: 8px;
    }

    /* detected article card */
    .detected-card {
      background: var(--bg-card);
      border: 1px solid var(--border-mid);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 16px;
      display: none;
    }
    .detected-label {
      font-size: 10px; color: var(--gold);
      text-transform: uppercase; letter-spacing: 0.12em;
      font-weight: 700; margin-bottom: 8px;
    }
    .detected-title {
      font-size: 14px; color: var(--text-1);
      font-weight: 500; line-height: 1.5;
      margin-bottom: 4px;
    }
    .detected-meta { font-size: 11px; color: var(--text-3); }

    /* toggle to manual */
    .toggle-manual {
      font-size: 11px; color: var(--text-3); cursor: pointer;
      text-align: right; margin-bottom: 10px;
      text-decoration: underline; text-underline-offset: 2px;
    }
    .toggle-manual:hover { color: var(--gold); }

    /* manual paste */
    #manualSection { margin-bottom: 14px; }
    textarea {
      width: 100%; height: 160px;
      background: var(--bg-card); border: 1px solid var(--border-mid);
      border-radius: 10px; color: var(--text-1);
      font-size: 13px; line-height: 1.7;
      padding: 12px 14px; resize: vertical;
      outline: none; font-family: inherit;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--gold); }
    textarea::placeholder { color: var(--text-3); }
    .quick-capture {
      margin-top: 13px; padding-top: 12px; border-top: 1px solid var(--border);
    }
    .quick-input {
      width: 100%; background: var(--bg-card); border: 1px solid var(--border-mid);
      border-radius: 8px; color: var(--text-1); font-size: 13px;
      padding: 9px 11px; outline: none; font-family: inherit;
      margin-bottom: 8px; transition: border-color 0.2s;
    }
    .quick-input:focus { border-color: var(--gold); }
    .quick-input::placeholder { color: var(--text-3); }
    .quick-row { display: flex; gap: 8px; align-items: center; }
    .quick-row .btn { flex: 1; }
    .quick-status {
      display: none; color: var(--green); font-size: 11px;
      margin-top: 8px; line-height: 1.5;
    }
    .zhihu-story-card {
      margin-top: 13px; padding: 13px;
      background: linear-gradient(180deg, var(--gold-glow2), transparent), var(--bg-card);
      border: 1px solid var(--border-mid); border-radius: 10px;
    }
    .zhihu-story-head {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
      margin-bottom: 10px;
    }
    .zhihu-story-title {
      font-size: 12px; color: var(--gold-light); font-weight: 700;
      letter-spacing: .04em;
    }
    .zhihu-story-desc {
      margin-top: 3px; font-size: 11px; line-height: 1.55; color: var(--text-3);
    }
    .zhihu-story-row { display: flex; gap: 8px; align-items: center; }
    .zhihu-story-select {
      flex: 1; min-width: 0; height: 34px;
      background: var(--bg-panel); border: 1px solid var(--border-mid);
      border-radius: 8px; color: var(--text-1); font-size: 12px;
      padding: 0 9px; outline: none; font-family: inherit;
    }
    .zhihu-story-mini {
      flex: 0 0 auto; width: auto; padding: 8px 10px; font-size: 12px;
      white-space: nowrap;
    }
    .zhihu-story-status {
      display: none; margin-top: 8px; font-size: 11px; line-height: 1.55;
      color: var(--text-3);
    }
    .zhihu-story-status.ok { color: var(--green); }
    .zhihu-story-status.err { color: var(--danger); }
    .btn-secondary {
      background: var(--bg-card); color: var(--gold); border: 1px solid var(--border-mid);
    }
    .btn-secondary:hover { background: var(--gold-glow); color: var(--gold-light); }

    /* button */
    .btn {
      width: 100%; padding: 11px;
      background: var(--gold); color: var(--bg);
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 500;
      cursor: pointer; font-family: inherit;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--gold-light); }
    .btn:disabled { background: var(--bg-active); color: var(--text-3); cursor: not-allowed; }
    .waiting-hint { font-size: 11px; color: var(--text-3); text-align: center; margin-bottom: 12px; }
    .divider {
      text-align: center; font-size: 11px; color: var(--text-3);
      margin: 10px 0; position: relative;
    }
    .divider::before, .divider::after {
      content: ''; position: absolute; top: 50%;
      width: 40%; height: 1px; background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    /* loading */
    .loading { display: none; padding: 34px 0 38px; text-align: center; }
    .knowledge-loader-wrap {
      display: flex; justify-content: center; margin-bottom: 13px;
      perspective: 420px;
    }
    .knowledge-loader {
      width: 96px; height: 96px; overflow: visible;
      filter: drop-shadow(0 0 18px rgba(200,164,74,.22));
    }
    .knowledge-loader-orbits,
    .knowledge-loader-gear,
    .knowledge-loader-nodes {
      transform-box: fill-box; transform-origin: center;
    }
    .knowledge-loader-orbits {
      animation: knowledgeOrbit 9.6s linear infinite;
    }
    .knowledge-loader-gear {
      animation: knowledgeGear 7.2s linear infinite reverse;
    }
    .knowledge-loader-nodes {
      animation: knowledgeNodes 3.6s ease-in-out infinite;
    }
    .knowledge-loader-core {
      transform-box: fill-box; transform-origin: center;
      animation: knowledgeCoreBreath 2.8s ease-in-out infinite;
    }
    @keyframes knowledgeOrbit {
      from { transform: rotateX(58deg) rotateZ(0deg); }
      to { transform: rotateX(58deg) rotateZ(360deg); }
    }
    @keyframes knowledgeGear {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes knowledgeNodes {
      0%, 100% { opacity: .42; transform: scale(.96); }
      45% { opacity: 1; transform: scale(1.04); }
      70% { opacity: .7; transform: scale(1); }
    }
    @keyframes knowledgeCoreBreath {
      0%, 100% { transform: scale(.94); opacity: .82; }
      50% { transform: scale(1.08); opacity: 1; }
    }
    .loading-text { margin-top: 12px; font-size: 12px; color: var(--text-3); }
    .knowledge-loading-message {
      margin-top: 9px; min-height: 18px;
      font-family: 'Noto Serif SC', serif;
      font-size: 12px; color: var(--gold-dim); line-height: 1.6;
      transition: opacity .3s ease;
    }
    .knowledge-loading-message.fading { opacity: .22; }

    /* error */
    .error-box {
      display: none; background: var(--danger-bg);
      border: 1px solid var(--danger); border-radius: 8px;
      padding: 14px 16px; color: var(--danger);
      font-size: 12px; line-height: 1.7; margin-top: 14px;
    }

    /* result cards */
    .result { display: none; margin-top: 20px; }
    .result-guide-anchor {
      display: none; margin-top: 16px; padding: 14px 16px;
      border: 1px dashed var(--border-mid); border-radius: 10px;
      color: var(--text-3); background: var(--bg-card);
      line-height: 1.7;
    }
    body.onboarding-result-guide .result-guide-anchor { display: block; }

    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px;
      margin-bottom: 12px;
    }
    .card-label {
      font-size: 10px; color: var(--gold);
      text-transform: uppercase; letter-spacing: 0.14em;
      font-weight: 700; margin-bottom: 12px;
    }
    .analysis-group { margin-bottom: 18px; }
    .analysis-group-title {
      font-family: 'Noto Serif SC', serif; font-size: 14px; font-weight: 700;
      color: var(--gold); letter-spacing: 0.1em; margin: 4px 0 10px;
      display: flex; align-items: center; gap: 10px;
    }
    .analysis-group-title::after {
      content: ""; height: 1px; flex: 1; background: var(--border-mid);
    }
    .analysis-group-body .card:last-child { margin-bottom: 0; }

    .field {
      background: var(--bg-panel); border-radius: 7px;
      padding: 10px 12px; margin-bottom: 8px;
    }
    .field:last-child { margin-bottom: 0; }
    .field-label { font-size: 10px; color: var(--text-3); margin-bottom: 3px; }
    .field-value { font-size: 13px; color: var(--text-2); line-height: 1.5; }

    .core-claim {
      font-size: 17px; font-weight: 600; color: var(--text-1);
      line-height: 1.5; margin-top: 14px; padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    /* strengths */
    .strength-item {
      background: var(--bg-panel); border-radius: 7px;
      padding: 10px 12px; border-left: 3px solid var(--green);
      margin-bottom: 8px;
    }
    .strength-item:last-child { margin-bottom: 0; }
    .strength-dim {
      font-size: 10px; color: var(--green); font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px;
    }
    .strength-evidence { font-size: 12px; color: var(--text-2); line-height: 1.6; }
    .craft-row {
      display: grid; grid-template-columns: 44px minmax(0,1fr); gap: 10px;
      background: var(--bg-panel); border-radius: 7px; padding: 9px 11px;
      margin-bottom: 7px;
    }
    .craft-row:last-child { margin-bottom: 0; }
    .craft-label { color: var(--gold); font-size: 11px; font-weight: 600; }
    .craft-value { color: var(--text-2); font-size: 12px; line-height: 1.65; }
    .craft-review-card {
      background:
        linear-gradient(90deg, rgba(187,107,93,.05), transparent 34%),
        var(--bg-card);
    }
    .craft-subtitle {
      color: var(--danger-light); font-size: 10px; font-weight: 700;
      letter-spacing: .12em; margin-bottom: 7px;
    }
    .teacher-praise {
      color: var(--text-1); font-family: 'Noto Serif SC', serif;
      font-size: 14px; line-height: 1.85;
      background: var(--bg-panel); border: 1px solid var(--border);
      border-radius: 8px; padding: 11px 12px;
    }
    .teacher-quote {
      display: inline; color: var(--text-1); font-size: 13px; line-height: 2.1;
      text-decoration-line: underline; text-decoration-style: wavy;
      text-decoration-color: var(--danger); text-underline-offset: 4px;
    }
    .craft-summary {
      margin-top: 10px; color: var(--text-2); font-size: 12px; line-height: 1.7;
      background: var(--bg-panel); border-radius: 7px; padding: 9px 10px;
    }
    .craft-summary span {
      color: var(--gold); font-size: 10px; font-weight: 700;
      letter-spacing: .1em; margin-right: 8px;
    }

    /* nodes */
    .node-item {
      background: var(--bg-panel); border-radius: 7px;
      padding: 11px 12px; border-left: 3px solid var(--border-mid);
      margin-bottom: 8px;
    }
    .node-item:last-child { margin-bottom: 0; }
    .node-item.is-clickable { cursor: pointer; transition: border-color 0.15s, background 0.15s; }
    .node-item[data-role="primary"]    { border-left-color: var(--gold); }
    .node-item[data-role="secondary"]  { border-left-color: var(--blue); }
    .node-item[data-role="background"] { border-left-color: var(--border-mid); }
    .node-item.is-clickable:hover { background: var(--bg-hover); }
    .node-item.is-clickable[data-role="primary"]:hover    { border-left-color: var(--gold-light); }
    .node-item.is-clickable[data-role="secondary"]:hover  { border-left-color: var(--blue); }
    .node-item.is-clickable[data-role="background"]:hover { border-left-color: var(--text-2); }
    .node-header { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 5px; }
    .node-name   { font-size: 13px; font-weight: 600; color: var(--text-1); }
    .badge { font-size: 10px; padding: 1px 6px; border-radius: 3px; }
    .badge-type { background: var(--bg-active); color: var(--text-2); }
    .badge-primary    { background: var(--gold-glow); color: var(--gold); }
    .badge-secondary  { background: var(--blue-bg); color: var(--blue); }
    .badge-background { background: var(--bg-card); color: var(--text-3); }
    .badge-linked     { background: var(--green-bg); color: var(--green); }
    .node-contribution { font-size: 12px; color: var(--text-2); line-height: 1.6; }

    /* tags */
    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      background: var(--bg-panel); border: 1px solid var(--border);
      color: var(--text-2); font-size: 11px; line-height: 1.35;
      padding: 4px 9px; border-radius: 8px;
      max-width: 100%; overflow-wrap: anywhere;
    }

    /* materials */
    .clip-item,
    .essence-item {
      background: var(--bg-panel); border-radius: 7px; padding: 10px 12px;
      margin-bottom: 8px; border-left: 3px solid var(--gold-dim);
    }
    .clip-item:last-child,
    .essence-item:last-child { margin-bottom: 0; }
    .clip-top { display: flex; gap: 8px; align-items: flex-start; }
    .clip-type {
      color: var(--gold); background: var(--gold-glow); border: 1px solid var(--gold-dim);
      border-radius: 4px; padding: 1px 6px; font-size: 10px; flex-shrink: 0;
    }
    .clip-content,
    .essence-view { color: var(--text-1); font-size: 13px; line-height: 1.55; }
    .clip-why,
    .essence-why { color: var(--text-2); font-size: 11px; line-height: 1.65; margin-top: 6px; }
    .analysis-chat-slot { min-height: 1px; }

    /* suggestions */
    .sug-item {
      background: var(--bg-panel); border-radius: 7px;
      padding: 12px 14px; margin-bottom: 8px;
    }
    .sug-item:last-child { margin-bottom: 0; }
    .sug-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
    .sug-badge {
      font-size: 10px; padding: 2px 7px; border-radius: 3px;
      font-weight: 600; white-space: nowrap; margin-top: 1px; flex-shrink: 0;
    }
    .sug-延伸 { background: var(--blue-bg); color: var(--blue); }
    .sug-补空 { background: var(--green-bg); color: var(--green); }
    .sug-跨域 { background: var(--gold-glow); color: var(--gold); }
    .sug-title  { font-size: 13px; color: var(--text-1); font-weight: 500; line-height: 1.5; }
    .sug-reason { font-size: 11px; color: var(--text-2); margin-top: 4px; line-height: 1.65; }
    .sug-ref    { font-size: 10px; color: var(--blue); margin-top: 5px; }

    /* insight */
    .insight {
      font-size: 14px; color: var(--text-2); line-height: 1.85;
      border-left: 3px solid var(--gold); padding-left: 14px;
    }

    /* raw JSON */
    .raw-toggle { margin-top: 16px; }
    .raw-toggle button {
      background: none; border: 1px solid var(--border);
      color: var(--text-3); font-size: 11px; padding: 5px 12px;
      border-radius: 5px; cursor: pointer; font-family: inherit;
    }
    .raw-toggle button:hover { color: var(--gold); border-color: var(--border-mid); }
    pre.raw-json {
      display: none; background: var(--bg-panel);
      border: 1px solid var(--border); border-radius: 7px;
      padding: 12px; font-family: 'Courier New', monospace;
      font-size: 11px; color: var(--text-2);
      white-space: pre-wrap; overflow-x: auto;
      margin-top: 8px; line-height: 1.6;
    }

    /* no-key banner */
    .no-key-banner {
      background: var(--bg-card); border: 1px solid var(--border-mid);
      border-radius: 10px; padding: 14px 16px; margin-bottom: 16px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .no-key-text { font-size: 12px; color: var(--text-2); line-height: 1.6; }
    .no-key-btn {
      background: var(--gold); color: var(--bg); border: none;
      border-radius: 6px; font-size: 12px; padding: 6px 14px;
      cursor: pointer; font-family: inherit; white-space: nowrap;
      flex-shrink: 0;
    }
    .no-key-btn:hover { background: var(--gold-light); }

    /* tabs */
    .tab-nav {
      display: flex; gap: 2px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border); padding-bottom: 0;
    }
    .tab-btn {
      background: none; border: none; border-bottom: 2px solid transparent;
      color: var(--text-2); font-size: 12px; padding: 7px 10px 9px;
      cursor: pointer; font-family: inherit; margin-bottom: -1px;
      transition: color 0.15s;
    }
    .tab-btn:hover { color: var(--text-1); }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
    .count-badge {
      display: none; background: var(--gold-glow); color: var(--gold);
      font-size: 10px; padding: 1px 5px; border-radius: 8px; margin-left: 5px;
    }

    /* asset list */
    .asset-empty { text-align: center; padding: 60px 20px; color: var(--text-3); font-size: 13px; line-height: 2; }
    .asset-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
      padding: 13px 14px; margin-bottom: 10px; cursor: pointer;
      transition: border-color 0.15s;
    }
    .asset-card:hover { border-color: var(--border-bright); }
    .asset-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .asset-domain { font-size: 10px; color: var(--gold); letter-spacing: 0.1em; }
    .asset-date   { font-size: 10px; color: var(--text-3); }
    .asset-title  {
      font-size: 13px; color: var(--text-1); font-weight: 500; line-height: 1.5; margin-bottom: 5px;
      overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .asset-claim  { font-size: 11px; color: var(--text-2); line-height: 1.6; }
    .selectable-asset-card {
      position: relative; padding-right: 44px; padding-bottom: 34px;
    }
    .selectable-asset-card.selected {
      border-color: var(--gold);
      background:
        radial-gradient(circle at 90% 88%, var(--gold-glow), transparent 32%),
        var(--bg-card);
    }
    .asset-select-btn {
      position: absolute; right: 11px; bottom: 11px;
      width: 22px; height: 22px; border-radius: 50%;
      border: 1px solid var(--gold-dim); background: rgba(12,10,6,.72);
      color: transparent; cursor: pointer; display: grid; place-items: center;
      box-shadow: 0 0 0 1px rgba(224,186,92,.05), 0 0 12px rgba(224,186,92,.12);
      transition: background .15s, color .15s, border-color .15s, box-shadow .15s, transform .15s;
    }
    .asset-select-btn:hover {
      border-color: var(--gold); box-shadow: 0 0 18px rgba(224,186,92,.25);
      transform: translateY(-1px);
    }
    .asset-select-btn.selected {
      color: var(--bg); background: var(--gold); border-color: var(--gold-light);
      box-shadow: 0 0 20px rgba(224,186,92,.34);
    }
    .asset-select-btn span { font-size: 13px; line-height: 1; font-weight: 800; }

    .node-index-meta {
      display: flex; flex-wrap: wrap; gap: 5px; align-items: center;
      margin-top: 6px;
    }
    .node-project-row {
      display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px;
    }
    .node-project-pill {
      background: var(--bg-panel); border: 1px solid var(--border); color: var(--text-2);
      font-size: 10px; padding: 2px 7px; border-radius: 8px;
      max-width: 100%; overflow-wrap: anywhere;
    }

    /* review */
    .review-stat-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .review-stat {
      flex: 1; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px; text-align: center;
    }
    .review-stat-num { font-size: 22px; font-weight: 700; color: var(--gold); }
    .review-stat-label { font-size: 10px; color: var(--text-3); margin-top: 4px; }

    .review-nav-block {
      margin: 12px 0 14px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }
    .review-nav-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 16px; color: var(--text-1); font-weight: 700;
      margin-bottom: 6px;
    }
    .review-anchors {
      position: sticky; top: 0; z-index: 4;
      display: flex; gap: 4px; padding: 8px 0;
      background: var(--bg); border-bottom: 1px solid var(--border);
      margin-bottom: 14px; overflow-x: auto;
    }
    .review-anchors::-webkit-scrollbar { height: 0; }
    .review-anchor {
      background: none; border: none; border-radius: 6px;
      color: var(--text-2); font-size: 12px; font-family: 'Noto Sans SC', sans-serif;
      padding: 6px 10px; cursor: pointer; white-space: nowrap;
      transition: color .15s, background .15s;
    }
    .review-anchor:hover { color: var(--text-1); }
    .review-anchor.active { color: var(--gold); background: var(--gold-glow); }
    .review-section { margin-bottom: 16px; scroll-margin-top: 60px; }
    .review-sub-block { margin-top: 14px; }
    .review-sub-block:first-child { margin-top: 0; }
    .review-section-title {
      font-size: 10px; color: var(--gold); letter-spacing: 0.14em;
      font-weight: 700; text-transform: uppercase; margin-bottom: 10px;
    }
    .weekly-report-card {
      background:
        radial-gradient(circle at 18% 20%, var(--gold-glow), transparent 36%),
        var(--bg-card);
      border: 1px solid var(--border-mid); border-radius: 8px;
      padding: 12px; margin-bottom: 12px;
    }
    .weekly-report-top {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 10px; margin-bottom: 9px;
    }
    .weekly-report-main-head { min-width: 0; flex: 1; }
    .weekly-report-kicker {
      font-size: 10px; color: var(--gold); letter-spacing: .12em;
      font-weight: 700; margin-bottom: 4px;
    }
    .weekly-report-title-row {
      display: flex; align-items: center; flex-wrap: wrap;
      gap: 8px 10px;
    }
    .weekly-report-title {
      font-family: 'Noto Serif SC', serif; font-size: 16px;
      color: var(--text-1); font-weight: 700;
    }
    .weekly-report-switcher {
      display: inline-flex; align-items: center; gap: 4px;
      max-width: 100%;
    }
    .weekly-report-nav-btn,
    .weekly-report-week-select {
      background: rgba(14,12,8,.72); color: var(--text-2);
      border: 1px solid var(--border-mid); border-radius: 5px;
      font-size: 11px; font-family: inherit; height: 26px;
    }
    .weekly-report-nav-btn {
      padding: 0 7px; cursor: pointer; white-space: nowrap;
    }
    .weekly-report-nav-btn:hover:not(:disabled) {
      color: var(--gold-light); background: var(--gold-glow);
    }
    .weekly-report-nav-btn:disabled { opacity: .35; cursor: default; }
    .weekly-report-week-select {
      min-width: 104px; max-width: 150px; padding: 0 6px; cursor: pointer;
    }
    .weekly-report-refresh {
      flex-shrink: 0; background: var(--bg-panel); color: var(--gold);
      border: 1px solid var(--border-mid); border-radius: 5px;
      padding: 5px 8px; font-size: 11px; cursor: pointer; font-family: inherit;
    }
    .weekly-report-refresh:hover:not(:disabled) { color: var(--gold-light); background: var(--gold-glow); }
    .weekly-report-refresh:disabled { opacity: .5; cursor: default; }
    .weekly-report-stats {
      color: var(--text-3); font-size: 11px; margin-bottom: 10px;
    }
    .weekly-report-grid { display: grid; gap: 8px; }
    .weekly-report-block {
      background: var(--bg-panel); border: 1px solid var(--border);
      border-radius: 7px; padding: 9px 10px;
    }
    .weekly-report-block span {
      display: block; color: var(--gold-dim); font-size: 10px;
      margin-bottom: 4px; letter-spacing: .08em;
    }
    .weekly-report-block p {
      color: var(--text-2); font-size: 12px; line-height: 1.7;
    }
    .weekly-report-reading {
      grid-column: 1 / -1;
    }
    .weekly-reading-item {
      margin-top: 8px; padding: 9px 10px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg-card);
    }
    .weekly-reading-title {
      color: var(--text-1); font-size: 12px; font-weight: 700; line-height: 1.55;
      margin-bottom: 6px;
    }
    .weekly-reading-line {
      display: flex; gap: 7px; align-items: flex-start;
      color: var(--text-2); font-size: 11px; line-height: 1.6;
    }
    .weekly-reading-line b {
      flex: 0 0 auto; color: var(--gold); font-weight: 700;
    }
    .weekly-reading-points {
      display: flex; flex-wrap: wrap; gap: 5px; margin: 7px 0 2px;
    }
    .weekly-reading-points span {
      border: 1px solid var(--border); border-radius: 999px;
      padding: 2px 7px; color: var(--text-2); font-size: 10px; background: var(--bg-panel);
    }
    .weekly-report-status {
      color: var(--gold); font-size: 11px; margin-top: 9px;
    }
    .weekly-report-history {
      margin-top: 10px; border-top: 1px solid var(--border); padding-top: 8px;
      max-height: 150px; overflow-y: auto;
    }
    .weekly-report-history-title {
      color: var(--gold-dim); font-size: 10px; font-weight: 700;
      letter-spacing: .1em; margin-bottom: 6px;
    }
    .weekly-report-history-row {
      width: 100%; display: flex; justify-content: space-between; gap: 10px;
      color: var(--text-3); font-size: 11px; padding: 5px 6px;
      border: 0; border-radius: 6px; background: transparent;
      cursor: pointer; font-family: inherit; text-align: left;
    }
    .weekly-report-history-row:hover { background: var(--gold-glow); color: var(--text-1); }
    .weekly-report-history-row.active { background: var(--gold-glow); color: var(--gold); }
    .weekly-report-history-row b {
      color: var(--text-2); font-weight: 400; text-align: right;
    }
    .weekly-report-history-row.active b { color: var(--gold-light); }
    html.theme-light .weekly-report-title {
      color: #0f2138;
    }
    html.theme-light .weekly-report-kicker,
    html.theme-light .weekly-report-status {
      color: #0f64d8;
    }
    html.theme-light .weekly-report-stats,
    html.theme-light .weekly-report-history-row,
    html.theme-light .weekly-report-history-row b {
      color: #405772;
    }
    html.theme-light .weekly-report-nav-btn,
    html.theme-light .weekly-report-week-select {
      background: #ffffff;
      color: #12365f;
      border-color: rgba(23,114,246,.34);
      box-shadow: 0 1px 0 rgba(23,114,246,.08);
    }
    html.theme-light .weekly-report-nav-btn:not(:disabled),
    html.theme-light .weekly-report-week-select {
      color: #0e4f9f;
      font-weight: 650;
    }
    html.theme-light .weekly-report-nav-btn:hover:not(:disabled),
    html.theme-light .weekly-report-week-select:hover {
      color: #063f91;
      background: #eaf3ff;
      border-color: rgba(23,114,246,.54);
    }
    html.theme-light .weekly-report-nav-btn:disabled {
      opacity: 1;
      color: #8092a8;
      background: #f2f6fc;
      border-color: rgba(86,126,175,.24);
    }
    html.theme-light .weekly-report-week-select {
      min-width: 126px;
    }
    html.theme-light .weekly-report-history-row:hover {
      background: rgba(23,114,246,.08);
      color: #0f2138;
    }
    html.theme-light .weekly-report-history-row.active {
      background: rgba(23,114,246,.12);
      color: #0d5ecf;
    }
    html.theme-light .weekly-report-history-row.active b {
      color: #0d5ecf;
    }
    .style-fingerprint-card {
      background:
        linear-gradient(135deg, rgba(200,164,74,.12), transparent 44%),
        var(--bg-card);
      border: 1px solid var(--border-mid); border-radius: 8px;
      padding: 13px 14px; margin-bottom: 12px;
    }
    .style-fingerprint-top {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 10px; margin-bottom: 9px;
    }
    .style-fingerprint-kicker {
      color: var(--gold); font-size: 10px; font-weight: 700;
      letter-spacing: .12em; margin-bottom: 4px;
    }
    .style-fingerprint-title {
      color: var(--text-1); font-family: 'Noto Serif SC', serif;
      font-size: 17px; font-weight: 700;
    }
    .style-fingerprint-refresh {
      flex-shrink: 0; background: var(--bg-panel); color: var(--gold);
      border: 1px solid var(--border-mid); border-radius: 5px;
      padding: 5px 8px; font-size: 11px; cursor: pointer; font-family: inherit;
    }
    .style-fingerprint-refresh:hover:not(:disabled) { color: var(--gold-light); background: var(--gold-glow); }
    .style-fingerprint-refresh:disabled { opacity: .5; cursor: default; }
    .style-fingerprint-body {
      color: var(--text-2); font-family: 'Noto Serif SC', serif;
      font-size: 14px; line-height: 1.85;
      white-space: pre-line;
    }
    .style-fingerprint-status {
      margin-top: 8px; color: var(--gold-dim); font-size: 11px;
    }

    .review-focus {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px; overflow: hidden;
    }
    .review-focus-grid {
      display: grid; grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px; margin-bottom: 12px;
    }
    .review-focus-card {
      background: var(--bg-panel); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px; min-width: 0;
    }
    .review-focus-label {
      font-size: 10px; color: var(--text-3); margin-bottom: 5px;
    }
    .review-focus-value {
      font-size: 22px; line-height: 1.1; color: var(--gold);
      font-weight: 700; font-family: 'Noto Serif SC', serif;
    }
    .review-focus-trend {
      margin-top: 5px; font-size: 10px; color: var(--text-2);
      line-height: 1.45; overflow-wrap: anywhere;
    }
    .review-domain-wordbar {
      display: flex; flex-direction: column; gap: 7px;
      border-top: 1px solid var(--border); padding-top: 10px;
    }
    .review-domain-word {
      display: grid; grid-template-columns: minmax(52px, 76px) minmax(0, 1fr) auto;
      align-items: center; gap: 8px;
    }
    .review-domain-name,
    .review-domain-count {
      font-size: 10px; color: var(--text-2); overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .review-domain-count { color: var(--text-3); }
    .review-domain-track {
      height: 5px; background: var(--bg-active); border-radius: 3px; overflow: hidden;
    }
    .review-domain-fill {
      height: 100%; background: var(--gold); border-radius: 3px;
      transition: width 0.35s ease;
    }
    .review-direction { display: flex; flex-direction: column; gap: 8px; }
    .tl-block {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px;
    }
    .tl-block-title {
      color: var(--gold); font-size: 12px; font-weight: 600;
      margin-bottom: 9px; font-family: 'Noto Serif SC', serif;
    }
    .tl-chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .tl-chip {
      color: var(--text-1); background: var(--gold-glow);
      border: 1px solid var(--gold-dim); border-radius: 999px;
      padding: 4px 8px; font-size: 11px; line-height: 1.35;
    }
    .tl-chip.muted {
      color: var(--text-3); background: var(--bg-panel); border-color: var(--border);
    }
    .tl-feedback {
      color: var(--text-2); background: var(--bg-panel);
      border-left: 3px solid var(--gold-dim); border-radius: 7px;
      padding: 10px 11px; font-size: 12px; line-height: 1.75;
      overflow-wrap: anywhere;
    }
    .direction-map-note {
      color: var(--text-2); background: var(--bg-panel);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 9px 10px; font-size: 11px; line-height: 1.7; margin-bottom: 10px;
    }
    .direction-domain-list { display: flex; flex-direction: column; gap: 10px; }
    .direction-domain-card {
      background: var(--bg-panel); border: 1px solid var(--border);
      border-radius: 8px; padding: 11px; min-width: 0;
    }
    .direction-domain-head {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 10px; margin-bottom: 9px;
    }
    .direction-domain-name {
      color: var(--text-1); font-size: 13px; font-weight: 700; line-height: 1.35;
      overflow-wrap: anywhere;
    }
    .direction-domain-meta {
      margin-top: 3px; color: var(--text-3); font-size: 10px; line-height: 1.45;
    }
    .direction-subdomain-list { display: flex; flex-direction: column; gap: 8px; }
    .direction-subdomain {
      border-top: 1px solid var(--border); padding-top: 8px;
    }
    .direction-sub-head {
      display: flex; justify-content: space-between; align-items: center;
      gap: 8px; margin-bottom: 7px;
    }
    .direction-sub-name {
      color: var(--gold); font-size: 12px; font-weight: 600;
      overflow-wrap: anywhere;
    }
    .direction-sub-count {
      color: var(--text-3); font-size: 10px; flex-shrink: 0;
    }
    .direction-points,
    .direction-works {
      display: flex; flex-wrap: wrap; gap: 5px;
    }
    .direction-point,
    .direction-work {
      color: var(--text-2); background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 999px;
      padding: 3px 7px; font-size: 10px; line-height: 1.35;
      max-width: 100%; overflow-wrap: anywhere;
    }
    .direction-point { color: var(--text-1); border-color: var(--gold-dim); }
    .direction-point.muted { color: var(--text-3); border-color: var(--border); }
    .direction-works { margin-top: 7px; }
    .direction-work { border-radius: 6px; }
    .direction-claim {
      margin-top: 7px; color: var(--text-2); font-size: 11px;
      line-height: 1.65; overflow-wrap: anywhere;
    }
    .direction-growth {
      margin-top: 10px; border-top: 1px solid var(--border); padding-top: 9px;
    }
    .direction-growth-title {
      color: var(--text-3); font-size: 10px; margin-bottom: 6px;
    }
    .direction-growth-item {
      color: var(--text-2); font-size: 11px; line-height: 1.7;
      border-left: 3px solid var(--gold-dim); padding-left: 9px;
      margin-top: 6px; overflow-wrap: anywhere;
    }

    .domain-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
    .domain-name { font-size: 12px; color: var(--text-2); width: 90px; flex-shrink: 0;
                   overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .domain-bar-wrap { flex: 1; background: var(--bg-panel); border-radius: 3px; height: 5px; }
    .domain-bar { background: var(--gold); border-radius: 3px; height: 5px; transition: width 0.4s; }
    .domain-count { font-size: 11px; color: var(--text-3); min-width: 20px; text-align: right; }

    .node-freq-item {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg-panel); border-radius: 7px; padding: 8px 10px; margin-bottom: 6px;
    }
    .node-freq-name { flex: 1; font-size: 12px; color: var(--text-2); }
    .node-freq-count { font-size: 11px; color: var(--gold); }
    .review-node-list.expanded {
      max-height: 350px; overflow-y: auto; padding-right: 2px;
    }
    .review-node-extra[hidden] { display: none; }
    .review-node-toggle {
      margin-top: 2px; background: none; border: none; padding: 4px 0;
      color: var(--gold); font-size: 11px; cursor: pointer; font-family: inherit;
    }
    .review-node-toggle:hover { color: var(--gold-light); }

    /* timeline deck */
    .tl-deck-layout {
      display: grid; grid-template-columns: minmax(0,1fr) clamp(118px,28vw,260px);
      min-height: 520px; border: 1px solid var(--border); border-radius: 8px;
      overflow: hidden;
      background: radial-gradient(circle at 24% 32%,var(--gold-glow2),transparent 34%),var(--bg);
    }
    .tl-deck-main { min-width: 0; display: flex; flex-direction: column; padding: 18px 20px 16px; overflow: hidden; }
    .tl-date-path {
      display: flex; align-items: center; gap: 10px; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px;
      margin-bottom: 18px; min-height: 46px; overflow-x: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(200,164,74,.52) rgba(200,164,74,.08);
    }
    .tl-date-path::-webkit-scrollbar { height: 6px; }
    .tl-date-path::-webkit-scrollbar-track {
      background: rgba(200,164,74,.08); border-radius: 999px;
    }
    .tl-date-path::-webkit-scrollbar-thumb {
      background: linear-gradient(90deg, var(--gold-dim), var(--gold));
      border-radius: 999px; box-shadow: 0 0 8px rgba(200,164,74,.22);
    }
    .tl-date-path-item {
      display: inline-flex; align-items: center; gap: 7px; border: 0; background: transparent;
      color: var(--text-2); font-size: 13px; font-family: inherit; white-space: nowrap;
      cursor: pointer; padding: 3px 4px;
    }
    .tl-date-path-item.active,
    .tl-date-path-item:hover { color: var(--gold); }
    .tl-date-path-icon {
      width: 18px; height: 18px; border: 1px solid var(--gold-dim);
      border-radius: 4px; display: inline-flex; align-items: center; justify-content: center;
      color: var(--gold); font-size: 11px; background: var(--gold-glow);
    }
    .tl-date-path-sep { color: var(--text-3); font-size: 14px; }
    .tl-date-track { position: relative; padding: 26px 22px 20px; margin-bottom: 16px; }
    .tl-date-track::before {
      content: ""; position: absolute; left: 24px; right: 24px; top: 36px;
      border-top: 2px solid rgba(200,164,74,.44);
    }
    .tl-date-dot-row {
      display: grid; grid-template-columns: repeat(var(--date-count,1),minmax(80px,1fr));
      gap: 14px; position: relative; z-index: 1;
    }
    .tl-date-dot-btn {
      border: 0; background: transparent; color: var(--text-2); cursor: pointer;
      font-family: inherit; display: flex; flex-direction: column; align-items: center;
      gap: 9px; min-width: 0;
    }
    .tl-date-dot {
      width: 18px; height: 18px; border-radius: 50%; border: 3px solid var(--gold-dim);
      background: var(--bg); box-shadow: 0 0 0 5px rgba(200,164,74,.055);
      transition: transform .16s,border-color .16s,box-shadow .16s;
    }
    .tl-date-dot-btn.active .tl-date-dot,
    .tl-date-dot-btn:hover .tl-date-dot {
      transform: scale(1.18); border-color: var(--gold);
      box-shadow: 0 0 0 8px rgba(200,164,74,.1);
    }
    .tl-date-dot-label { font-size: 12px; color: var(--gold); line-height: 1.2; }
    .tl-date-dot-sub { font-size: 10px; color: var(--text-3); }
    .tl-deck-area { flex: 1; min-height: 0; display: flex; align-items: center; overflow: hidden; }
    .tl-card-deck {
      display: flex; align-items: center; gap: 12px; overflow-x: auto; overflow-y: hidden;
      scroll-behavior: auto; scroll-padding-inline: clamp(70px,10vw,132px);
      padding: 18px clamp(70px,10vw,132px) 22px; width: 100%; height: 100%;
      overscroll-behavior-inline: contain;
    }
    .tl-card-deck::-webkit-scrollbar { height: 0; }
    @keyframes tlDealIn {
      from { opacity: 0; translate: 36px 0; rotate: 3deg; }
      to { opacity: 1; translate: 0 0; rotate: 0deg; }
    }
    .tl-deck-card {
      flex: 0 0 182px; height: 280px; overflow: hidden;
      background: linear-gradient(180deg,rgba(255,255,255,.025),rgba(255,255,255,.005)),var(--bg-card);
      border: 1px solid var(--border); border-radius: 10px; padding: 15px;
      cursor: pointer; transition: transform .2s ease,opacity .3s ease,border-color .24s ease,box-shadow .2s ease,flex-basis .32s cubic-bezier(.2,.72,.16,1);
      display: flex; flex-direction: column; gap: 10px;
      animation: tlDealIn .42s cubic-bezier(.2,.72,.16,1) both;
      animation-delay: calc(var(--deal-index,0) * .052s);
    }
    .tl-card-deck.has-active .tl-deck-card:not(.active) { opacity: .66; }
    .tl-card-deck:hover .tl-deck-card:not(:hover) { opacity: .66; }
    .tl-deck-card:hover {
      transform: translateY(-6px); opacity: 1; border-color: var(--gold);
      box-shadow: 0 8px 24px rgba(200,164,74,.35),0 0 0 1px rgba(200,164,74,.38),0 14px 34px rgba(0,0,0,.32);
    }
    .tl-deck-card.active { opacity: 1; border-color: var(--gold-dim); }
    .tl-card-icon {
      width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--gold-dim);
      background: var(--gold-glow); color: var(--gold); display: flex; align-items: center;
      justify-content: center; font-size: 15px; margin-bottom: 6px;
    }
    .tl-card-title {
      font-size: 16px; color: var(--text-1); font-family: 'Noto Serif SC', serif;
      font-weight: 700; line-height: 1.45;
    }
    .tl-card-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .tl-card-tag {
      font-size: 10px; color: var(--gold); border: 1px solid var(--gold-dim);
      background: var(--gold-glow); border-radius: 4px; padding: 2px 6px;
      max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .tl-card-label { font-size: 10px; color: var(--text-3); margin-top: 4px; }
    .tl-card-summary {
      font-size: 12px; color: var(--text-2); line-height: 1.7;
      display: -webkit-box; -webkit-line-clamp: 4; line-clamp: 4;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .tl-card-action {
      margin-top: auto; border-top: 1px solid var(--border); padding-top: 10px;
      font-size: 12px; color: var(--gold); display: flex; justify-content: flex-end; gap: 8px;
    }
    .tl-card-rail { display: grid; grid-template-columns: 34px minmax(0,1fr) 34px; align-items: center; gap: 10px; padding: 7px 4px 0; }
    .tl-rail-btn { height: 28px; border: 0; background: transparent; color: var(--text-3); font-size: 26px; cursor: pointer; }
    .tl-rail-btn:hover { color: var(--gold); }
    .tl-card-slider { width: 100%; accent-color: var(--gold); cursor: pointer; }
    .tl-rail-meta { text-align: center; font-size: 10px; color: var(--gold); line-height: 1.5; margin-top: 2px; }
    .tl-date-gear { border-left: 1px solid var(--border); background: rgba(0,0,0,.08); padding: 18px 14px; overflow-y: auto; }
    .tl-date-gear-title { font-size: 13px; color: var(--text-1); font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .tl-date-gear-list { display: flex; flex-direction: column; gap: 7px; position: relative; }
    .tl-date-gear-list::before { content: ""; position: absolute; left: 17px; top: 10px; bottom: 10px; border-left: 1px dashed rgba(200,164,74,.25); }
    .tl-date-gear-item {
      position: relative; z-index: 1; display: grid; grid-template-columns: 22px 1fr auto;
      align-items: center; gap: 8px; border: 1px solid transparent; background: transparent;
      color: var(--text-2); border-radius: 20px; padding: 8px 9px; cursor: pointer;
      font-family: inherit; text-align: left;
    }
    .tl-date-gear-item:hover,
    .tl-date-gear-item.active { background: var(--gold-glow); border-color: var(--gold-dim); color: var(--gold); }
    .tl-gear-dot { width: 13px; height: 13px; border-radius: 50%; border: 2px solid var(--text-3); box-shadow: 0 0 0 3px rgba(255,255,255,.02); }
    .tl-date-gear-item.active .tl-gear-dot { border-color: var(--gold); box-shadow: 0 0 0 5px rgba(200,164,74,.14); }
    .tl-gear-label { font-size: 12px; line-height: 1.35; }
    .tl-gear-count { font-size: 10px; color: var(--text-3); }
    .tl-empty { color: var(--text-3); font-size: 12px; line-height: 1.8; padding: 22px; border: 1px dashed var(--border); border-radius: 8px; background: var(--bg-card); }
    @media (max-width: 520px) {
      .tl-deck-layout { grid-template-columns: 1fr; min-height: auto; }
      .tl-date-gear { border-left: 0; border-top: 1px solid var(--border); max-height: 220px; }
      .tl-deck-main { padding: 14px 12px; }
      .tl-date-track { padding-left: 6px; padding-right: 6px; }
      .tl-date-dot-row { grid-template-columns: repeat(var(--date-count,1),minmax(56px,1fr)); gap: 6px; }
      .tl-card-deck { padding-inline: 42px; scroll-padding-inline: 42px; }
    }

    /* review — 本周/本月 */
    .period-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .period-card {
      flex: 1; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px;
    }
    .period-label  { font-size: 10px; color: var(--text-3); margin-bottom: 6px; }
    .period-num    { font-size: 20px; font-weight: 700; color: var(--gold); margin-bottom: 4px; }
    .period-topics { font-size: 10px; color: var(--text-2); line-height: 1.65; }

    /* review — 创作模式 */
    .pattern-item {
      background: var(--bg-panel); border-left: 3px solid var(--border-mid);
      border-radius: 7px; padding: 10px 12px; margin-bottom: 8px;
      font-size: 12px; color: var(--text-2); line-height: 1.65;
    }

    /* review — 创作者驾驶舱 */
    .dashboard-grid {
      display: grid; grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px; margin-bottom: 10px;
    }
    .dashboard-card, .dashboard-panel, .rhythm-panel {
      background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px;
    }
    .dashboard-card { padding: 10px; min-width: 0; }
    .dashboard-label, .dashboard-panel-title {
      font-size: 10px; color: var(--text-3); margin-bottom: 6px;
    }
    .dashboard-num { font-size: 21px; font-weight: 700; color: var(--gold); }
    .dashboard-note, .dashboard-muted {
      font-size: 10px; color: var(--text-2); line-height: 1.6; overflow-wrap: anywhere;
    }
    .dashboard-muted { padding: 2px 0; }
    .rhythm-panel { padding: 10px; margin-bottom: 10px; }
    .rhythm-bars {
      height: 32px; display: flex; align-items: flex-end; gap: 3px;
    }
    .rhythm-cell {
      flex: 1 1 0; min-width: 0; height: 4px;
      background: var(--bg-active); border-radius: 3px 3px 1px 1px;
    }
    .rhythm-cell.active { background: var(--gold); }
    .rhythm-cell.idea-only { background: var(--gold-dim); }
    .rhythm-cell.mixed { background: var(--text-2); }
    .rhythm-meta {
      display: flex; justify-content: space-between; margin-top: 7px;
      font-size: 10px; color: var(--text-3);
    }
    .dashboard-two-col {
      display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px;
    }
    .dashboard-panel { padding: 10px; min-width: 0; }
    .dashboard-pill-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 6px; }
    .dashboard-pill {
      background: var(--bg-card); border: 1px solid var(--border); color: var(--text-2);
      border-radius: 7px; padding: 3px 7px; font-size: 10px;
      max-width: 100%; overflow-wrap: anywhere;
    }
    .dashboard-node-main {
      color: var(--gold); font-size: 13px; line-height: 1.5; margin-bottom: 4px;
      overflow-wrap: anywhere;
    }
    .review-chat-entry { margin-top: 18px; }
    .review-chat-open { width: 100%; }
    .review-chat-panel { margin-top: 10px; }
    .review-chat-card { background: var(--bg-card); border-color: var(--border-mid); }

    /* map tab */
    .map-tools {
      position: absolute; left: 12px; top: 12px; z-index: 4;
      display: flex; align-items: center; gap: 6px; padding: 6px;
      background: rgba(13,11,8,0.72); border: 1px solid var(--border);
      border-radius: 7px; backdrop-filter: blur(10px);
    }
    .map-tool {
      height: 28px; padding: 0 10px; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 5px;
      color: var(--text-2); font-size: 11px; font-family: inherit;
      cursor: pointer; transition: color 0.15s, border-color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .map-tool:hover { color: var(--text-1); border-color: var(--gold-dim); }
    .map-tool.active {
      color: var(--gold); background: var(--gold-glow); border-color: var(--gold-dim);
    }
    .map-tool:disabled {
      cursor: default; opacity: .42; color: var(--text-3);
    }
    .map-node-fab {
      position: absolute; right: 14px; bottom: 14px; z-index: 5;
      height: 30px; padding: 0 12px; background: var(--gold-glow);
      border: 1px solid var(--gold-dim); border-radius: 999px;
      color: var(--gold); font-size: 11px; font-family: inherit;
      cursor: pointer; box-shadow: 0 8px 24px rgba(0,0,0,.24);
    }
    .map-node-fab:hover { color: var(--gold-light); border-color: var(--gold); }
    .map-hint {
      position: absolute; left: 14px; bottom: 14px; z-index: 4;
      font-size: 10px; color: var(--text-3);
      background: rgba(13,11,8,0.68); border: 1px solid var(--border);
      border-radius: 5px; padding: 5px 8px; pointer-events: none;
    }
    .node-hover-card {
      position: absolute; z-index: 6; width: min(320px, calc(100% - 24px));
      max-height: min(380px, calc(100% - 28px)); overflow: hidden;
      display: none; background: rgba(18,15,10,0.94);
      border: 1px solid var(--border-mid); border-radius: 8px;
      box-shadow: 0 18px 54px rgba(0,0,0,0.46);
      backdrop-filter: blur(14px); padding: 11px; pointer-events: auto;
    }
    .node-hover-card.visible { display: flex; flex-direction: column; gap: 9px; }
    .node-hover-head {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 10px; border-bottom: 1px solid var(--border); padding-bottom: 8px;
    }
    .node-hover-title { min-width: 0; }
    .node-hover-name {
      font-size: 13px; color: var(--text-1); font-weight: 600; line-height: 1.35;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .node-hover-sub { font-size: 10px; color: var(--text-3); line-height: 1.6; margin-top: 2px; }
    .node-hover-count {
      font-size: 10px; color: var(--gold); border: 1px solid var(--gold-dim);
      background: var(--gold-glow); border-radius: 4px; padding: 2px 6px; white-space: nowrap;
    }
    .node-hover-list { display: flex; flex-direction: column; gap: 7px; overflow-y: auto; padding-right: 2px; }
    .node-hover-article {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 7px; padding: 8px 9px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s; min-width: 0;
    }
    .node-hover-article:hover { border-color: var(--gold-dim); background: var(--bg-hover); }
    .node-hover-article-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .node-hover-article-title { font-size: 12px; color: var(--text-1); line-height: 1.45; font-weight: 500; min-width: 0; }
    .node-hover-date { font-size: 10px; color: var(--text-3); white-space: nowrap; line-height: 1.45; }
    .node-hover-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .node-hover-tag {
      font-size: 10px; color: var(--gold); background: var(--gold-glow);
      border: 1px solid var(--gold-dim); border-radius: 4px; padding: 1px 5px;
      max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .node-hover-hit {
      font-size: 11px; color: var(--text-2); line-height: 1.55; margin-top: 6px;
      display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .node-hover-hit b { color: var(--gold); font-weight: 500; }
    .node-hover-empty {
      font-size: 12px; color: var(--text-3); line-height: 1.7;
      background: var(--bg-card); border: 1px dashed var(--border-mid);
      border-radius: 7px; padding: 10px;
    }
    .graph-area {
      position: relative; overflow: hidden; min-height: 460px;
      background: radial-gradient(ellipse at 40% 50%, var(--gold-glow2) 0%, transparent 60%);
      border: 1px solid var(--border); border-radius: 10px;
    }
    body[data-active-tab="map"] .graph-area {
      min-height: max(540px, calc(100vh - 126px));
    }
    .universe-area {
      min-height: 540px; background: #030206; border-color: rgba(230,196,106,.08);
      border-radius: 4px;
      box-shadow: inset 0 0 150px rgba(13,8,30,.74), 0 18px 64px rgba(0,0,0,.34);
    }
    body[data-active-tab="map"] .universe-area {
      min-height: max(580px, calc(100vh - 126px));
    }
    #earthSphere {
      display: block; width: 100%; height: 476px;
      cursor: grab; touch-action: none;
      user-select: none; -webkit-user-select: none;
    }
    body[data-active-tab="map"] #earthSphere {
      height: max(540px, calc(100vh - 126px));
    }
    #universeView { display: block; width: 100%; height: 540px; }
    body[data-active-tab="map"] #universeView {
      height: max(580px, calc(100vh - 126px));
    }
    .universe-canvas-wrap {
      position: absolute; inset: 0; width: 100%; height: 100%;
      background:
        radial-gradient(ellipse at 48% 42%, rgba(52,70,118,.34), transparent 38%),
        radial-gradient(ellipse at 52% 55%, rgba(207,161,72,.16), transparent 34%),
        #030206;
    }
    .universe-canvas-wrap::before,
    .universe-canvas-wrap::after {
      content: ""; position: absolute; inset: 0; z-index: 2;
      pointer-events: none;
    }
    .universe-canvas-wrap::before {
      background:
        radial-gradient(ellipse at center, transparent 56%, rgba(0,0,0,.18) 84%, rgba(0,0,0,.48) 100%),
        linear-gradient(180deg, rgba(255,220,140,.045), transparent 28%, transparent 74%, rgba(87,114,180,.045));
      mix-blend-mode: normal;
    }
    .universe-canvas-wrap::after {
      background: linear-gradient(112deg, transparent 22%, rgba(255,232,174,.08) 42%, transparent 58%);
      opacity: .14; transform: translateX(-36%);
      animation: universeSlideSheen 36s ease-in-out infinite;
      mix-blend-mode: screen;
    }
    .universe-canvas-wrap canvas {
      display: block; width: 100%; height: 100%; outline: none;
      cursor: grab; touch-action: none;

    /* chat */
    /* 主分析完成 toast */
    .analyze-done-toast {
      position: fixed; right: 16px; bottom: 22px; z-index: 13000;
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px 10px 10px;
      background: var(--bg-panel);
      border: 1.5px solid var(--gold); border-radius: 14px;
      box-shadow: 0 14px 38px rgba(0,0,0,.5), 0 0 0 1px var(--gold-glow), 0 0 24px rgba(200,164,74,.32);
      opacity: 0; transform: translateY(28px) scale(0.85);
      pointer-events: none;
    }
    .analyze-done-toast[hidden] { display: none; }
    .analyze-done-toast.show {
      animation:
        analyzeDoneToastIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
        analyzeDoneToastOut 0.45s ease 2.5s forwards;

    @keyframes analyzeDoneToastIn {

      60%  { opacity: 1; transform: translateY(-6px) scale(1.06); }
      100% { opacity: 1; transform: translateY(0) scale(1); }

      letter-spacing: 0.5px;

    }

    .chat-card { display: flex; flex-direction: column; gap: 10px; position: relative; }
