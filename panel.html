      border-radius: 5px; padding: 3px 7px; font-size: 11px;
    }

    /* detail view */
    .detail-back {
      display: inline-flex; align-items: center; gap: 5px;
      color: var(--text-2); font-size: 12px; cursor: pointer; margin-bottom: 16px; padding: 4px 0;
    }
    .detail-back:hover { color: var(--gold); }
    .detail-delete-btn {
      background: var(--danger-bg); color: var(--danger);
      border: 1px solid var(--danger);
    }
    .detail-delete-btn:hover { background: var(--danger-bg); color: var(--danger); }
    .detail-action-row,
    .markdown-editor-actions {
      display: flex; gap: 8px; margin-top: 16px;
    }
    .detail-action-row .btn,
    .markdown-editor-actions .btn {
      flex: 1; margin-top: 0;
    }
    .node-detail-head {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
      padding: 15px 16px; margin-bottom: 14px;
    }
    .node-detail-kicker {
      font-size: 10px; color: var(--gold); letter-spacing: 0.14em;
      font-weight: 700; text-transform: uppercase; margin-bottom: 6px;
    }
    .node-detail-title {
      font-size: 18px; color: var(--text-1); font-weight: 650;
      line-height: 1.4; margin-bottom: 9px;
    }
    .node-detail-meta,
    .node-detail-roles {
      display: flex; flex-wrap: wrap; gap: 7px; align-items: center;
      font-size: 11px; color: var(--text-2);
    }
    .node-detail-roles { margin-top: 9px; }
    .node-mention-role { margin-top: 9px; }
    .idea-detail-title {
      font-size: 17px; color: var(--text-1); font-weight: 650;
      line-height: 1.45; margin-bottom: 7px;
    }
    .idea-detail-meta { font-size: 11px; color: var(--text-2); margin-bottom: 13px; }
    .idea-detail-body {
      white-space: pre-wrap; font-size: 13px; line-height: 1.8;
      color: var(--text-2); background: var(--bg-panel); border-radius: 8px;
      padding: 12px 13px;
    }
    .markdown-editor-head {
      margin-bottom: 10px;
    }
    .markdown-editor-title {
      font-size: 15px; color: var(--text-1); font-weight: 650; line-height: 1.45;
    }
    .markdown-editor-input {
      height: 420px; min-height: 260px; font-family: 'Courier New', monospace;
      font-size: 12px; line-height: 1.65; white-space: pre;
    }
    .markdown-editor-status {
      display: none; margin-top: 10px; font-size: 11px; line-height: 1.6;
      color: var(--gold);
    }
    .wikilink-suggest {
      border: 1px solid var(--border-mid); background: var(--bg-panel); border-radius: 8px;
      margin-top: 7px; overflow: hidden;
    }
    .wikilink-suggest-item {
      display: block; width: 100%; text-align: left; border: 0; border-bottom: 1px solid var(--border);
      background: transparent; color: var(--text-2); padding: 8px 10px; font-size: 12px;
      cursor: pointer; font-family: inherit;
    }
    .wikilink-suggest-item:last-child { border-bottom: 0; }
    .wikilink-suggest-item:hover { background: var(--bg-hover); color: var(--text-1); }

    /* 2.0 visual foundation */
    .settings-btn { color: var(--text-3); }
    .settings-btn:hover { color: var(--gold); background: var(--gold-glow); }
    .project-select,
    textarea,
    .quick-input,
    .asset-search,
    .asset-date-select,
    .chat-input,
    .markdown-editor-input {
      background: var(--bg-card); border-color: var(--border-mid); color: var(--text-1);
    }
    .project-select:focus,
    textarea:focus,
    .quick-input:focus,
    .asset-search:focus,
    .asset-date-select:focus,
    .chat-input:focus,
    .markdown-editor-input:focus {
      border-color: var(--gold); color: var(--text-1);
    }
    textarea::placeholder,
    .quick-input::placeholder,
    .asset-search::placeholder,
    .chat-input::placeholder { color: var(--text-3); }
    .detected-card,
    .card,
    .asset-card,
    .clip-card,
    .review-stat,
    .period-card,
    .review-focus,
    .review-focus-card,
    .tl-block,
    .dashboard-card,
    .dashboard-panel,
    .rhythm-panel,
    .chat-message,
    .node-index-card,
    .node-detail-card,
    .idea-card,
    .markdown-editor-head {
      background: var(--bg-card); border-color: var(--border);
    }
    .detected-label,
    .card-label,
    .review-section-title,
    .asset-domain,
    .node-detail-kicker,
    .dashboard-num,
    .review-focus-value,
    .tl-block-title,
    .period-num,
    .review-stat-num { color: var(--gold); }
    .detected-title,
    .asset-title,
    .clip-card-content,
    .chat-message-body,
    .node-name,
    .core-claim,
    .idea-detail-title,
    .markdown-editor-title { color: var(--text-1); }
    .detected-meta,
    .asset-date,
    .asset-claim,
    .clip-card-why,
    .field-label,
    .field-value,
    .node-contribution,
    .insight,
    .pattern-item,
    .review-focus-trend,
    .tl-feedback,
    .dashboard-note,
    .chat-status,
    .dashboard-muted { color: var(--text-2); }
    .field,
    .node-item,
    .sug-item,
    .pattern-item,
    .node-freq-item,
    .dashboard-pill,
    .tl-feedback,
    .tag {
      background: var(--bg-panel); border-color: var(--border);
    }
    .btn { background: var(--gold); color: var(--bg); }
    .btn:hover { background: var(--gold-light); }
    .btn:disabled { background: var(--bg-active); color: var(--text-3); }
    .btn-secondary,
    .asset-mode,
    .assets-toolbar-btn,
    .chat-template-btn,
    .chat-send-btn,
    .chat-save-actions button,
    .no-key-btn {
      background: var(--bg-card); color: var(--gold); border-color: var(--border-mid);
    }
    .btn-secondary:hover,
    .asset-mode:hover,
    .assets-toolbar-btn:hover,
    .chat-template-btn:hover,
    .chat-send-btn:hover,
    .chat-save-actions button:hover,
    .no-key-btn:hover {
      background: var(--gold-glow); color: var(--gold-light); border-color: var(--border-bright);
    }
    .tab-nav { border-bottom-color: var(--border); }
    .tab-btn { color: var(--text-2); }
    .tab-btn:hover { color: var(--text-1); }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
    .count-badge { background: var(--gold-glow); color: var(--gold); }
    .domain-bar { background: var(--gold); }
    .rhythm-cell.active { background: var(--gold); }
    .raw-toggle button { border-color: var(--border); color: var(--text-3); }
    .raw-toggle button:hover { color: var(--gold); border-color: var(--border-mid); }
    .raw-json { background: var(--bg-panel); border-color: var(--border); color: var(--text-2); }
    .onboarding-layer {
      position: fixed; inset: 0; z-index: 20000; display: none;
      background: rgba(4,6,10,.30); backdrop-filter: blur(1px);
      pointer-events: none;
    }
    .onboarding-layer.visible { display: block; }
    .onboarding-layer.peek {
      background: rgba(4,6,10,.08); backdrop-filter: none;
    }
    html.theme-light .onboarding-layer { background: rgba(18,45,85,.12); }
    html.theme-light .onboarding-layer.peek { background: rgba(18,45,85,.04); }
    .onboarding-card {
      position: fixed; left: 18px; top: 72px;
      z-index: 20020;
      width: min(100%, 430px); background: var(--bg-panel);
      border: 1px solid var(--border-bright); border-radius: 12px;
      box-shadow: 0 18px 60px rgba(0,0,0,.38), 0 0 0 1px var(--gold-glow);
      padding: 16px 16px 14px; color: var(--text-1);
      max-height: min(42vh, 390px); overflow-y: auto;
      pointer-events: auto;
      transition: none;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .onboarding-card::-webkit-scrollbar { width: 0; height: 0; }
    .onboarding-layer.compact .onboarding-card {
      max-height: none; overflow: visible; width: min(100%, 400px);
    }
    .onboarding-step-meta {
      font-size: 10px; color: var(--gold); letter-spacing: .12em;
      font-weight: 700; margin-bottom: 8px;
    }
    .onboarding-title {
      font-family: 'Noto Serif SC', serif; font-size: 17px;
      color: var(--text-1); margin-bottom: 8px; line-height: 1.35;
    }
    .onboarding-body {
      color: var(--text-2); font-size: 13px; line-height: 1.75;
      white-space: pre-line;
    }
    .onboarding-em-strong {
      color: var(--text-1); font-weight: 900;
      text-shadow: 0 1px 0 rgba(0,0,0,.9), 0 0 10px rgba(0,0,0,.35);
    }
    .onboarding-em-gold {
      color: var(--gold-light); font-weight: 900;
      text-shadow: 0 1px 0 #000, 0 0 12px var(--gold-glow);
    }
    html.theme-light .onboarding-em-strong {
      color: #111827; text-shadow: 0 1px 0 rgba(255,255,255,.72);
    }
    html.theme-light .onboarding-em-gold {
      color: #9a6a00; text-shadow: 0 1px 0 rgba(255,255,255,.85), 0 0 10px rgba(196,141,28,.22);
    }
    .onboarding-actions {
      display: flex; gap: 8px; align-items: center; justify-content: flex-end;
      margin-top: 14px; flex-wrap: wrap;
    }
    .onboarding-btn {
      border: 1px solid var(--border-mid); border-radius: 8px;
      background: var(--bg-card); color: var(--gold); padding: 8px 12px;
      font-size: 12px; cursor: pointer; font-family: inherit;
    }
    .onboarding-btn.primary {
      background: var(--gold); color: var(--bg); border-color: var(--gold);
      font-weight: 600;
    }
    .onboarding-btn:hover { border-color: var(--border-bright); color: var(--gold-light); }
    .onboarding-btn.primary:hover { background: var(--gold-light); color: var(--bg); }
    .onboarding-skip { margin-right: auto; color: var(--text-3); }
    .onboarding-highlight {
      position: relative; z-index: 19999 !important;
      outline: 2px solid var(--gold); outline-offset: 4px;
      box-shadow: 0 0 0 8px var(--gold-glow), 0 0 24px var(--gold-glow);
      border-radius: 8px;
    }
    .onboarding-layer.peek .onboarding-highlight {
      outline-width: 1px;
      box-shadow: 0 0 0 5px rgba(196,141,28,.14), 0 0 26px rgba(196,141,28,.22);
    }
    .onboarding-arrow {
      position: fixed; z-index: 20021; display: none;
      width: 34px; height: 34px; pointer-events: none;
      color: var(--gold); font-size: 28px; line-height: 34px;
      text-align: center; text-shadow: 0 2px 12px var(--gold-glow);
    }
    .onboarding-arrow.visible { display: block; }

    /* 引导结束后的"分析自己文章"提示气泡 */
    .analyze-own-hint {
      position: fixed; z-index: 12500;
      width: min(264px, calc(100vw - 20px));
      padding: 24px 14px 13px;
      border: 1.5px solid var(--gold); border-radius: 12px;
      background: var(--bg-panel); color: var(--text-1);
      box-shadow: 0 18px 48px rgba(0,0,0,.5), 0 0 0 1px var(--gold-glow), 0 0 24px rgba(200,164,74,.32);
      opacity: 0; transform: translateY(-8px); pointer-events: none;
      transition: opacity .22s ease, transform .22s ease;
      text-align: center;
    }
    .analyze-own-hint[hidden] { display: none; }
    .analyze-own-hint.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .analyze-own-hint-arrow {
      position: absolute; top: -14px; left: 50%;
      width: 20px; height: 20px;
      transform: translateX(-50%);
      pointer-events: none;
      animation: analyzeOwnHintBounce 1.1s ease-in-out infinite;
      filter: drop-shadow(0 0 8px rgba(200,164,74,.85)) drop-shadow(0 0 2px rgba(255,220,140,.9));
    }
    .analyze-own-hint-arrow::before {
      content: ""; position: absolute; inset: 0;
      background: var(--gold);
      clip-path: polygon(50% 0%, 100% 55%, 70% 55%, 70% 100%, 30% 100%, 30% 55%, 0% 55%);
    }
    @keyframes analyzeOwnHintBounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%      { transform: translateX(-50%) translateY(-5px); }
    }
    .analyze-own-hint-title {
      font-size: 13.5px; color: var(--text-1); line-height: 1.55; font-weight: 500;
    }
    .own-emphasis {
      display: inline-block;
      font-size: 18px;
      font-weight: 800;
      color: #ffd96b;
      text-shadow:
        0 0 10px rgba(255,217,107,.75),
        0 0 3px rgba(255,237,160,1),
        0 1px 0 rgba(0,0,0,.55);
      padding: 0 4px;
      letter-spacing: 0.5px;
    }
    html.theme-light .own-emphasis {
      color: #b8860b;
      text-shadow:
        0 0 6px rgba(184,134,11,.35),
        0 1px 0 rgba(255,255,255,.6);
    }
    .analyze-own-hint-body {
      margin-top: 8px;
      font-size: 11.5px; color: var(--text-2); line-height: 1.55;
    }
    .analyze-own-hint-warn {
      margin-top: 10px; padding: 6px 8px;
      border: 1px dashed var(--gold-dim); border-radius: 6px;
      font-size: 10.5px; line-height: 1.5;
      color: var(--gold); background: var(--gold-glow);
    }
    .analyze-own-hint-close {
      position: absolute; top: 3px; right: 5px;
      background: none; border: none;
      color: var(--text-3); font-size: 16px; line-height: 1;
      padding: 4px 7px; border-radius: 4px;
      cursor: pointer; font-family: inherit;
    }
    .analyze-own-hint-close:hover { color: var(--gold); background: var(--bg-card); }
    html.theme-light .analyze-own-hint {
      box-shadow: 0 18px 48px rgba(28,54,94,.18), 0 0 0 1px rgba(200,164,74,.18), 0 0 24px rgba(200,164,74,.2);
    }
  </style>
</head>
<body>

<div class="header">
  <h1>知乎创作图鉴</h1>
  <div class="project-bar">
    <select id="projectSelect" class="project-select"></select>
    <button id="recaptureBtn" class="project-capture-btn" type="button" title="重新抓取当前知乎页" aria-label="重新抓取当前知乎页">
      <span class="capture-graph-icon" aria-hidden="true"><i></i><i></i><i></i></span>
    </button>
    <button id="deleteProjectBtn" class="proj-del-btn" title="删除当前项目" disabled>✕</button>
  </div>
  <button class="onboarding-replay-btn" id="onboardingReplayBtn" type="button" title="新手指引" aria-label="新手指引">?</button>
  <div class="onboarding-entry-hint" id="onboardingEntryHint" hidden>
    <div class="onboarding-entry-title">首次引导在这里</div>
    <div class="onboarding-entry-body">第一次先跑通 API 设置和第一篇文章；其他区点开后再出现对应引导。</div>
    <div class="onboarding-entry-actions">
      <button type="button" id="onboardingEntryDismissBtn">知道了</button>
      <button type="button" class="primary" id="onboardingEntryStartBtn">开始当前区引导</button>
    </div>
  </div>
  <button class="theme-toggle-btn" id="themeToggleBtn" type="button" title="开灯模式" aria-label="开灯模式">☀</button>
  <button class="settings-btn" id="settingsBtn" title="API 设置">⚙</button>
</div>

<div class="top-metrics" id="topMetrics">
  <div class="prog-wrap" id="weekProgWrap">
    <span class="prog-label" id="weekProgLabel">本周 0/3 篇</span>
    <div class="prog-track"><div class="prog-fill" id="weekProgFill"></div></div>
    <span class="prog-pct" id="weekProgPct">0%</span>
    <select class="prog-goal" id="weekGoalSelect" title="选择每周几篇算达标" aria-label="每周达标篇数">
      <option value="1">1篇</option>
      <option value="2">2篇</option>
      <option value="3">3篇</option>
      <option value="4">4篇</option>
      <option value="5">5篇</option>
      <option value="6">6篇</option>
      <option value="7">7篇</option>
      <option value="8">8篇</option>
      <option value="9">9篇</option>
      <option value="10">10篇</option>
      <option value="12">12篇</option>
      <option value="15">15篇</option>
      <option value="20">20篇</option>
      <option value="30">30篇</option>
    </select>
  </div>
  <div class="top-period-hint" id="topPeriodHint">通过作品，看见创作者自己 · 今日 0 篇 · 本月 0 篇</div>
</div>

<div class="tab-nav" id="tabNav">
  <button class="tab-btn active" data-tab="analyze">分析</button>
  <button class="tab-btn" data-tab="assets">资产<span class="count-badge" id="assetCount"></span></button>
  <button class="tab-btn" data-tab="review">复盘</button>
  <button class="tab-btn" data-tab="map">地图</button>
  <button class="tab-btn" data-tab="fingerprint">读出的你</button>
  <button class="tab-btn" data-tab="author">分身</button>
</div>

<div id="analyzeTab">

<!-- 自动检测到的知乎内容 -->
<div class="detected-card" id="detectedCard">
  <div class="detected-label" id="detectedLabel">已检测到作品</div>
  <div class="detected-title" id="detectedTitle"></div>
  <div class="detected-meta" id="detectedMeta"></div>
</div>
<div class="toggle-manual" id="toggleManual" style="display:none">切换为手动粘贴</div>

<!-- 等待状态 -->
<div id="waitingSection">
  <div class="waiting-hint">导入知乎作品，让旧文章继续为下一篇创作工作</div>
  <button class="btn btn-secondary" id="demoArticleBtn" type="button" style="margin-top:10px">载入示例文章</button>
  <div class="divider">或手动粘贴</div>
  <textarea id="articleInput" placeholder="把文章 / 回答内容粘贴进来……" style="height:130px"></textarea>
  <button class="btn" id="manualBtn" style="margin-top:10px">粘贴内容并分析</button>
</div>
<div class="quick-capture">
  <input id="quickTitleInput" class="quick-input" type="text" placeholder="灵感标题">
  <textarea id="quickBodyInput" placeholder="写下一个想法、问题或选题……" style="height:84px"></textarea>
  <div class="quick-row">
    <button class="btn btn-secondary" id="quickSaveBtn">保存速记</button>
  </div>
  <div class="quick-status" id="quickStatus"></div>
</div>

<button class="btn" id="analyzeBtn" style="display:none;margin-top:12px">开始分析</button>

<div class="loading" id="loading">
  <div class="knowledge-loader-wrap">
    <svg class="knowledge-loader" viewBox="0 0 120 120" aria-hidden="true">
      <defs>
        <radialGradient id="knowledgeCoreGlow" cx="40%" cy="35%">
          <stop offset="0%" stop-color="#fff2b8"/>
          <stop offset="55%" stop-color="#c8a44a"/>
          <stop offset="100%" stop-color="#4c3265"/>
        </radialGradient>
        <filter id="knowledgeSoftGlow" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="2.8" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      <g class="knowledge-loader-orbits" fill="none" stroke="rgba(200,164,74,.5)" stroke-width="1.4">
        <ellipse cx="60" cy="60" rx="47" ry="18"/>
        <ellipse cx="60" cy="60" rx="37" ry="14" transform="rotate(62 60 60)"/>
        <ellipse cx="60" cy="60" rx="42" ry="16" transform="rotate(122 60 60)"/>
      </g>
      <g class="knowledge-loader-gear" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linecap="round">
        <circle cx="60" cy="60" r="23"/>
        <path d="M60 25v9M60 86v9M25 60h9M86 60h9M35 35l7 7M78 78l7 7M85 35l-7 7M42 78l-7 7"/>
        <circle cx="60" cy="60" r="8"/>
      </g>
      <g class="knowledge-loader-nodes" filter="url(#knowledgeSoftGlow)">
        <path d="M38 72 53 43 82 52 72 82 38 72Z" fill="none" stroke="rgba(255,232,164,.45)" stroke-width="1"/>
        <circle cx="38" cy="72" r="3.4" fill="#e9c86a"/>
        <circle cx="53" cy="43" r="2.8" fill="#fff2b8"/>
        <circle cx="82" cy="52" r="3.2" fill="#c8a44a"/>
        <circle cx="72" cy="82" r="2.6" fill="#8f6ed5"/>
      </g>
      <circle class="knowledge-loader-core" cx="60" cy="60" r="13" fill="url(#knowledgeCoreGlow)" filter="url(#knowledgeSoftGlow)"/>
    </svg>
  </div>
  <div class="loading-text">知乎创作图鉴正在拆成作品资产…</div>
  <div class="knowledge-loading-message" id="knowledgeLoadingMessage">知乎创作图鉴正在整理观点资产</div>
</div>

<div class="error-box" id="errorBox"></div>
<div class="result-guide-anchor" id="resultGuideAnchor">分析完成后，完整解析内容会显示在这里。</div>
<div class="result"  id="result"></div>

</div><!-- /analyzeTab -->
<div id="assetsTab" style="display:none">
  <div id="assetsToolbar"></div>
  <div id="assetsList"></div>
</div>
<div id="reviewTab" style="display:none"></div>
<div id="mapTab"    style="display:none"></div>
<div id="fingerprintTab" style="display:none"></div>
<div id="authorTab" style="display:none"></div>

<div class="analyze-done-toast" id="analyzeDoneToast" role="status" aria-live="polite" hidden>
  <div class="adt-mascot" aria-hidden="true"></div>
  <div class="adt-text">
    <span class="adt-title">答好啦!</span>
    来看看你这篇的分析结果
  </div>
</div>

<div class="analyze-own-hint" id="analyzeOwnHint" role="dialog" aria-live="polite" hidden>
  <button type="button" class="analyze-own-hint-close" id="analyzeOwnHintCloseBtn" aria-label="关闭提示">×</button>
  <div class="analyze-own-hint-arrow" aria-hidden="true"></div>
  <div class="analyze-own-hint-title">现在就来分析一篇<span class="own-emphasis">自己</span>的文章吧</div>
  <div class="analyze-own-hint-body">打开你自己的知乎文章页,然后点上方按钮抓取当前页。</div>
